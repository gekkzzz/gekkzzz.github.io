<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You found me! enjoy some pong - gekkzzz</title>
  <link rel="icon" type="image/png" href="../assets/images/avatar.png">
  <link rel="stylesheet" href="../assets/css/site.css">
  <style>
    .secret-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 4.25rem 1rem 2rem;
      background: repeating-linear-gradient(
        0deg,
        #030303 0,
        #030303 3px,
        #000000 3px,
        #000000 6px
      );
    }

    .pong-shell {
      width: min(960px, 100%);
      border: 2px solid #f2f2f2;
      border-radius: 0;
      padding: 0.85rem;
      background: #000000;
      box-shadow: none;
    }

    .pong-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.7rem;
    }

    .pong-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f2f2f2;
    }

    .pong-hint {
      margin: 0;
      color: #cfcfcf;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #pong-canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 0;
      border: 2px solid #f2f2f2;
      background: #000000;
      image-rendering: pixelated;
      touch-action: none;
      cursor: ns-resize;
    }

    .pong-status {
      margin: 0.7rem 0 0;
      color: #cfcfcf;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .back-link {
      position: fixed;
      right: 0.9rem;
      top: 0.75rem;
      z-index: 30;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: #f2f2f2;
      border-bottom: none;
      padding: 0.35rem 0.5rem;
      border: 1px solid #f2f2f2;
      border-radius: 0;
      background: #000000;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: #000000;
      border-color: #f2f2f2;
      background: #f2f2f2;
    }

    @media (max-width: 700px) {
      .secret-wrap {
        padding: 4.25rem 0.8rem 1.5rem;
      }

      .pong-shell {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <a class="corner-avatar-link" href="/" aria-label="Back to home">
    <img class="corner-avatar" src="../assets/images/avatar.png" alt="Avatar">
  </a>
  <a class="back-link" href="/">Back Home</a>

  <main class="secret-wrap">
    <section class="pong-shell" aria-label="Secret Pong game">
      <div class="pong-header">
        <h1 class="pong-title">You found me! enjoy some pong</h1>
        <p class="pong-hint">W/S, Arrows, Mouse, Drag, Click/Tap Serve</p>
      </div>
      <canvas id="pong-canvas" width="960" height="540" aria-label="Pong game canvas"></canvas>
      <p class="pong-status" id="pong-status">First to 10 wins. Space, click, or tap to serve.</p>
    </section>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById('pong-canvas');
      const ctx = canvas.getContext('2d');
      const statusEl = document.getElementById('pong-status');
      ctx.imageSmoothingEnabled = false;

      const WORLD_WIDTH = canvas.width;
      const WORLD_HEIGHT = canvas.height;

      const paddle = {
        width: 14,
        height: 96,
        speed: 520
      };

      const left = {
        x: 28,
        y: (WORLD_HEIGHT - paddle.height) / 2,
        score: 0
      };

      const right = {
        x: WORLD_WIDTH - 28 - paddle.width,
        y: (WORLD_HEIGHT - paddle.height) / 2,
        score: 0
      };

      const ball = {
        size: 14,
        x: WORLD_WIDTH / 2,
        y: WORLD_HEIGHT / 2,
        vx: 0,
        vy: 0,
        speed: 420,
        inPlay: false
      };

      const keys = {
        ArrowUp: false,
        ArrowDown: false,
        KeyW: false,
        KeyS: false
      };

      let activeTouchPointerId = null;

      let winner = null;
      let lastTime = performance.now();

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function movePlayerPaddleFromClientY(clientY) {
        const rect = canvas.getBoundingClientRect();
        if (!rect.height) return;

        const yInCanvas = (clientY - rect.top) * (WORLD_HEIGHT / rect.height);
        left.y = clamp(yInCanvas - paddle.height / 2, 0, WORLD_HEIGHT - paddle.height);
      }

      function resetBall(direction) {
        ball.x = WORLD_WIDTH / 2;
        ball.y = WORLD_HEIGHT / 2;
        ball.inPlay = false;
        ball.vx = 0;
        ball.vy = 0;

        statusEl.textContent = winner
          ? winner + ' wins. Space, click, or tap to restart.'
          : 'First to 10 wins. Space, click, or tap to serve.';

        ball.nextDirection = direction;
      }

      function serveBall() {
        if (winner) {
          left.score = 0;
          right.score = 0;
          winner = null;
        }

        if (ball.inPlay) return;

        const direction = ball.nextDirection || (Math.random() > 0.5 ? 1 : -1);
        const angle = (Math.random() * 0.7 - 0.35);
        ball.vx = Math.cos(angle) * ball.speed * direction;
        ball.vy = Math.sin(angle) * ball.speed;
        ball.inPlay = true;
        statusEl.textContent = 'Play on.';
      }

      function handleInput(dt) {
        const upPressed = keys.ArrowUp || keys.KeyW;
        const downPressed = keys.ArrowDown || keys.KeyS;

        if (upPressed && !downPressed) {
          left.y -= paddle.speed * dt;
        } else if (downPressed && !upPressed) {
          left.y += paddle.speed * dt;
        }

        left.y = clamp(left.y, 0, WORLD_HEIGHT - paddle.height);
      }

      function updateAi(dt) {
        const paddleCenter = right.y + paddle.height / 2;
        const centerLine = WORLD_HEIGHT / 2;
        const deadZone = 14;
        const wobble = Math.sin(performance.now() * 0.004) * 7;
        const trackingTarget = ball.vx > 0 ? ball.y + wobble : centerLine;
        const speed = ball.vx > 0 ? paddle.speed * 0.62 : paddle.speed * 0.34;

        if (paddleCenter < trackingTarget - deadZone) {
          right.y += speed * dt;
        } else if (paddleCenter > trackingTarget + deadZone) {
          right.y -= speed * dt;
        }

        right.y = clamp(right.y, 0, WORLD_HEIGHT - paddle.height);
      }

      function paddleBounce(pad, isLeftPad) {
        const padTop = pad.y;
        const padBottom = pad.y + paddle.height;
        const ballTop = ball.y - ball.size / 2;
        const ballBottom = ball.y + ball.size / 2;
        const ballLeft = ball.x - ball.size / 2;
        const ballRight = ball.x + ball.size / 2;

        const hit = isLeftPad
          ? ballLeft <= pad.x + paddle.width && ballRight >= pad.x
          : ballRight >= pad.x && ballLeft <= pad.x + paddle.width;

        if (!hit || ballBottom < padTop || ballTop > padBottom) return false;

        const relativeIntersectY = (pad.y + paddle.height / 2) - ball.y;
        const normalized = relativeIntersectY / (paddle.height / 2);
        const bounceAngle = normalized * 0.9;

        const currentSpeed = Math.min(880, Math.hypot(ball.vx, ball.vy) * 1.05);
        const direction = isLeftPad ? 1 : -1;

        ball.vx = Math.cos(bounceAngle) * currentSpeed * direction;
        ball.vy = -Math.sin(bounceAngle) * currentSpeed;

        if (isLeftPad) {
          ball.x = pad.x + paddle.width + ball.size / 2 + 1;
        } else {
          ball.x = pad.x - ball.size / 2 - 1;
        }

        return true;
      }

      function updateBall(dt) {
        if (!ball.inPlay || winner) return;

        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        if (ball.y - ball.size / 2 <= 0) {
          ball.y = ball.size / 2;
          ball.vy *= -1;
        } else if (ball.y + ball.size / 2 >= WORLD_HEIGHT) {
          ball.y = WORLD_HEIGHT - ball.size / 2;
          ball.vy *= -1;
        }

        paddleBounce(left, true);
        paddleBounce(right, false);

        if (ball.x + ball.size / 2 < 0) {
          right.score += 1;
          if (right.score >= 10) winner = 'CPU';
          resetBall(1);
        } else if (ball.x - ball.size / 2 > WORLD_WIDTH) {
          left.score += 1;
          if (left.score >= 10) winner = 'You';
          resetBall(-1);
        }
      }

      function drawNet() {
        const segHeight = 18;
        const gap = 14;
        const x = WORLD_WIDTH / 2 - 2;

        ctx.fillStyle = '#f2f2f2';
        for (let y = 10; y < WORLD_HEIGHT - segHeight; y += segHeight + gap) {
          ctx.fillRect(x, y, 4, segHeight);
        }
      }

      function drawPaddle(pad, color) {
        ctx.fillStyle = color;
        ctx.fillRect(pad.x, pad.y, paddle.width, paddle.height);
      }

      function drawBall() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ball.x - ball.size / 2, ball.y - ball.size / 2, ball.size, ball.size);
      }

      function drawScore() {
        ctx.fillStyle = '#f2f2f2';
        ctx.font = '700 54px JetBrains Mono, monospace';
        ctx.textAlign = 'center';
        ctx.fillText(String(left.score), WORLD_WIDTH * 0.25, 76);
        ctx.fillText(String(right.score), WORLD_WIDTH * 0.75, 76);
      }

      function drawScanlines() {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        for (let y = 0; y < WORLD_HEIGHT; y += 4) {
          ctx.fillRect(0, y, WORLD_WIDTH, 1);
        }
      }

      function draw() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

        drawNet();
        drawPaddle(left, '#ffffff');
        drawPaddle(right, '#ffffff');
        drawBall();
        drawScore();
        drawScanlines();
      }

      function loop(now) {
        const dt = Math.min(0.025, (now - lastTime) / 1000);
        lastTime = now;

        handleInput(dt);
        updateAi(dt);
        updateBall(dt);
        draw();

        requestAnimationFrame(loop);
      }

      canvas.addEventListener('pointerdown', (event) => {
        movePlayerPaddleFromClientY(event.clientY);
        serveBall();

        if (event.pointerType !== 'mouse') {
          activeTouchPointerId = event.pointerId;
          canvas.setPointerCapture(event.pointerId);
          event.preventDefault();
        }
      });

      canvas.addEventListener('pointermove', (event) => {
        if (event.pointerType === 'mouse') {
          movePlayerPaddleFromClientY(event.clientY);
          return;
        }

        if (event.pointerId === activeTouchPointerId) {
          movePlayerPaddleFromClientY(event.clientY);
          event.preventDefault();
        }
      });

      function releaseTouchPointer(event) {
        if (event.pointerId !== activeTouchPointerId) return;

        if (canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }

        activeTouchPointerId = null;
      }

      canvas.addEventListener('pointerup', releaseTouchPointer);
      canvas.addEventListener('pointercancel', releaseTouchPointer);

      window.addEventListener('keydown', (event) => {
        if (event.code in keys) {
          keys[event.code] = true;
          event.preventDefault();
        }

        if (event.code === 'Space') {
          serveBall();
          event.preventDefault();
        }
      });

      window.addEventListener('keyup', (event) => {
        if (event.code in keys) {
          keys[event.code] = false;
          event.preventDefault();
        }
      });

      resetBall(Math.random() > 0.5 ? 1 : -1);
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
