<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gekkzzz - web developer, video essayist, nerd</title>
  <link rel="stylesheet" href="https://unpkg.com/github-calendar@latest/dist/github-calendar-responsive.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrap">
    <a class="corner-avatar-link" href="#">
      <img class="corner-avatar" src="image.png" alt="Avatar">
    </a>

    <div class="container">
      <header class="hero">
        <div>
          <h1 class="site-title">gekkzzz</h1>
          <div class="available-badge">
            <span class="status-dot"></span>
            <span class="available-text">Available For Work</span>
          </div>
          <p class="eyebrow">Web Developer, Video Essayist, Nerd</p>
          <p class="subtitle">Writing about JavaScript, CSS, and building clean web experiences.</p>
        </div>

        <nav class="hero-links">
          <a href="https://gekkzzz.substack.com" target="_blank" rel="noopener">Blog</a>
          <a href="about.html">About</a>
          <a href="#">Newsletter</a>
        </nav>
      </header>

      <main>
        <section class="contributions">
          <div class="section-head">
            <h2>Activity</h2>
            <a class="section-link" href="https://github.com/gekkzzz" target="_blank" rel="noopener">View GitHub</a>
          </div>
          <div id="github-calendar" class="calendar contribution-frame">Loading activity&hellip;</div>

        <section class="posts">
          <h2>Latest Blog Posts</h2>
          <ul class="post-list" id="post-list">
            <li class="post-empty">Loading&hellip;</li>
          </ul>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 gekkzzz. All rights reserved.</p>
      </footer>
    </div>
  </div>
  <script src="https://unpkg.com/github-calendar@latest/dist/github-calendar.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
